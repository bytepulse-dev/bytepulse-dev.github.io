<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}BytePulse — IT-новости{{ else }}{{ .Title }} — BytePulse{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}Технологии, ИИ и кибербезопасность — без воды{{ else }}{{ .Summary }}{{ end }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QJR9ZT9PZG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QJR9ZT9PZG');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f3; color: #1a1a1a; line-height: 1.6; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* HEADER */
    header { background: #fff; border-bottom: 1px solid #e8e8e6; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 800; color: #1a1a1a; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    .logo-pulse { width: 8px; height: 8px; border-radius: 50%; background: #2563eb; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)} }
    nav { display: flex; align-items: center; gap: 4px; }
    .nav-link { font-size: 14px; font-weight: 500; color: #6b6b6b; padding: 6px 12px; border-radius: 8px; transition: color .15s, background .15s; white-space: nowrap; }
    .nav-link:hover { color: #1a1a1a; background: #f0f0ee; }
    .nav-tg { font-size: 13px; font-weight: 600; color: #fff; background: #2563eb; padding: 7px 14px; border-radius: 8px; margin-left: 8px; transition: background .15s; white-space: nowrap; }
    .nav-tg:hover { background: #1d4ed8; }

    /* MOBILE HEADER */
    .nav-mobile-menu { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .nav-mobile-menu svg { width: 22px; height: 22px; }
    .mobile-nav { display: none; background: #fff; border-bottom: 1px solid #e8e8e6; padding: 12px 16px; flex-direction: column; gap: 4px; }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { font-size: 15px; font-weight: 500; color: #1a1a1a; padding: 10px 12px; border-radius: 8px; }
    .mobile-nav a:hover { background: #f0f0ee; }
    .mobile-nav .nav-tg { color: #fff; background: #2563eb; text-align: center; margin-top: 4px; }

    @media (max-width: 640px) {
      .header-inner { padding: 0 16px; }
      nav { display: none; }
      .nav-mobile-menu { display: block; }
    }

    /* LAYOUT */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

    /* FOOTER */
    footer { background: #fff; border-top: 1px solid #e8e8e6; margin-top: 64px; padding: 32px 0; }
    .footer-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .footer-copy { font-size: 13px; color: #9b9b9b; }
    .footer-tg { font-size: 13px; font-weight: 600; color: #2563eb; }
    .footer-tg:hover { text-decoration: underline; }

    /* CAT BADGES */
    .cat { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
    .cat-ai       { background: #ede9fe; color: #6d28d9; }
    .cat-security { background: #fee2e2; color: #dc2626; }
    .cat-it       { background: #dbeafe; color: #1d4ed8; }
    .cat-tools    { background: #d1fae5; color: #065f46; }

    @media (max-width: 768px) {
      .container { padding: 0 16px; }
      .footer-inner { padding: 0 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/"><div class="logo-pulse"></div>BytePulse</a>
    <nav>
      <a class="nav-link" href="/posts/">Все статьи</a>
      <a class="nav-link" href="/categories/">Темы</a>
      <a class="nav-link" href="/about/">О сайте</a>
      <a class="nav-tg" href="https://t.me/BytePulsechannel" target="_blank">Telegram →</a>
    </nav>
    <button class="nav-mobile-menu" onclick="document.getElementById('mobileNav').classList.toggle('open')" aria-label="Меню">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div class="mobile-nav" id="mobileNav">
    <a href="/posts/">Все статьи</a>
    <a href="/categories/">Темы</a>
    <a href="/about/">О сайте</a>
    <a class="nav-tg" href="https://t.me/BytePulsechannel" target="_blank">Telegram →</a>
  </div>
</header>

<main>
  {{- block "main" . }}{{- end }}
</main>

<footer>
  <div class="footer-inner">
    <span class="footer-copy">© {{ now.Year }} BytePulse</span>
    <a class="footer-tg" href="https://t.me/BytePulsechannel" target="_blank">@BytePulsechannel в Telegram</a>
  </div>
</footer>

</body>
</html>

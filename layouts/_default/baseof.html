<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}BytePulse — IT-новости{{ else }}{{ .Title }} — BytePulse{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}Технологии, ИИ и кибербезопасность — без воды{{ else }}{{ .Summary }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ── HEADER ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e8e8e6;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 1280px; margin: 0 auto;
      padding: 0 32px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-family: 'Manrope', sans-serif;
      font-size: 20px; font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2563eb;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.7); opacity: 0.5; }
    }
    nav { display: flex; align-items: center; gap: 4px; }
    .nav-link {
      font-size: 14px; font-weight: 500;
      color: #6b6b6b;
      padding: 6px 14px;
      border-radius: 8px;
      transition: color .15s, background .15s;
    }
    .nav-link:hover { color: #1a1a1a; background: #f0f0ee; }
    .nav-tg {
      font-size: 13px; font-weight: 600;
      color: #fff;
      background: #2563eb;
      padding: 7px 16px;
      border-radius: 8px;
      margin-left: 8px;
      transition: background .15s;
    }
    .nav-tg:hover { background: #1d4ed8; }

    /* ── MAIN ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

    /* ── FOOTER ── */
    footer {
      background: #fff;
      border-top: 1px solid #e8e8e6;
      margin-top: 64px;
      padding: 32px 0;
    }
    .footer-inner {
      max-width: 1280px; margin: 0 auto; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .footer-copy { font-size: 13px; color: #9b9b9b; }
    .footer-tg { font-size: 13px; font-weight: 600; color: #2563eb; }
    .footer-tg:hover { text-decoration: underline; }

    /* ── CAT BADGES ── */
    .cat { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
    .cat-ai      { background: #ede9fe; color: #6d28d9; }
    .cat-security{ background: #fee2e2; color: #dc2626; }
    .cat-it      { background: #dbeafe; color: #1d4ed8; }
    .cat-tools   { background: #d1fae5; color: #065f46; }
    .cat-default { background: #f3f4f6; color: #374151; }

    @media (max-width: 768px) {
      .header-inner { padding: 0 16px; }
      .container { padding: 0 16px; }
      .footer-inner { padding: 0 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="/"><div class="logo-pulse"></div>BytePulse</a>
    <nav>
      <a class="nav-link" href="/posts/">Все статьи</a>
      <a class="nav-link" href="/categories/">Темы</a>
      <a class="nav-link" href="/about/">О сайте</a>
      <a class="nav-tg" href="https://t.me/BytePulsechannel" target="_blank">Telegram →</a>
    </nav>
  </div>
</header>

<main>
  {{- block "main" . }}{{- end }}
</main>

<footer>
  <div class="footer-inner">
    <span class="footer-copy">© {{ now.Year }} BytePulse</span>
    <a class="footer-tg" href="https://t.me/BytePulsechannel" target="_blank">Telegram-канал @BytePulsechannel</a>
  </div>
</footer>

</body>
</html>
